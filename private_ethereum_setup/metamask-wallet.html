<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local PoS Devnet MetaMask Wallet</title>
  <script src="https://unpkg.com/ethers@5.8.0/dist/ethers.umd.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 { font-size: 1.5rem; }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    input, select, button {
      font-size: 1rem;
      padding: 8px 12px;
      margin-top: 6px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    input, select {
      width: 100%;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      background: #037dd6;
      color: #fff;
      border: none;
    }
    button:hover { background: #0260a6; }
    button:disabled { background: #999; cursor: not-allowed; }
    .row { display: flex; gap: 8px; align-items: center; }
    .row input, .row select { flex: 1; }
    .status {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #555;
      word-break: break-all;
    }
    .error { color: #d32f2f; }
    .success { color: #388e3c; }
    code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>Local PoS Devnet MetaMask Wallet</h1>

  <div class="card">
    <h2>1. Connect MetaMask</h2>
    <p>
      Make sure your devnet is running, then connect MetaMask and add the custom network.
    </p>
    <div class="row">
      <select id="rpcSelect">
        <option value="http://127.0.0.1:18545">Node 1 - http://127.0.0.1:18545</option>
        <option value="http://127.0.0.1:18546">Node 2 - http://127.0.0.1:18546</option>
        <option value="http://127.0.0.1:18547">Node 3 - http://127.0.0.1:18547</option>
        <option value="http://127.0.0.1:18548">Node 4 - http://127.0.0.1:18548</option>
        <option value="http://127.0.0.1:18549">Node 5 - http://127.0.0.1:18549</option>
      </select>
      <button id="connectBtn">Connect &amp; Add Network</button>
    </div>
    <div id="connectStatus" class="status"></div>
  </div>

  <div class="card">
    <h2>2. Account Balance</h2>
    <p>Connected account: <code id="account">Not connected</code></p>
    <p>Balance: <strong id="balance">-</strong></p>
    <button id="refreshBtn" disabled>Refresh Balance</button>
  </div>

  <div class="card">
    <h2>3. Send Transaction</h2>
    <label for="toInput">Recipient address</label>
    <input id="toInput" type="text" placeholder="0x...">

    <label for="amountInput">Amount (ETH)</label>
    <input id="amountInput" type="number" step="0.0001" placeholder="1.0">

    <button id="sendBtn" disabled>Send</button>
    <div id="sendStatus" class="status"></div>
  </div>

  <script>
    const CHAIN_ID = '0x3039'; // 12345 in hex
    const CHAIN_ID_DECIMAL = 12345;
    const CURRENCY = 'ETH';

    const connectBtn = document.getElementById('connectBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const sendBtn = document.getElementById('sendBtn');
    const rpcSelect = document.getElementById('rpcSelect');
    const connectStatus = document.getElementById('connectStatus');
    const accountEl = document.getElementById('account');
    const balanceEl = document.getElementById('balance');
    const toInput = document.getElementById('toInput');
    const amountInput = document.getElementById('amountInput');
    const sendStatus = document.getElementById('sendStatus');

    let provider = null;
    let signer = null;

    async function connect() {
      connectStatus.textContent = '';
      connectStatus.className = 'status';

      if (!window.ethereum) {
        connectStatus.textContent = 'MetaMask not detected. Please install the MetaMask extension.';
        connectStatus.classList.add('error');
        return;
      }

      try {
        const rpcUrl = rpcSelect.value;

        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [{
            chainId: CHAIN_ID,
            chainName: 'Local PoS Devnet',
            rpcUrls: [rpcUrl],
            nativeCurrency: {
              name: 'Ether',
              symbol: CURRENCY,
              decimals: 18
            }
          }]
        });
      } catch (err) {
        console.warn('wallet_addEthereumChain failed or was rejected:', err);
      }

      try {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: CHAIN_ID }]
        });
      } catch (err) {
        connectStatus.textContent = 'Failed to switch network: ' + err.message;
        connectStatus.classList.add('error');
        return;
      }

      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        const rpcUrl = rpcSelect.value;
        provider = new ethers.providers.Web3Provider(window.ethereum, {
          name: 'localdev',
          chainId: CHAIN_ID_DECIMAL
        });
        signer = provider.getSigner();

        accountEl.textContent = accounts[0];
        connectStatus.textContent = 'Connected to ' + rpcUrl;
        connectStatus.classList.add('success');
        refreshBtn.disabled = false;
        sendBtn.disabled = false;

        await refreshBalance();
      } catch (err) {
        connectStatus.textContent = 'Connection rejected: ' + err.message;
        connectStatus.classList.add('error');
      }
    }

    async function refreshBalance() {
      if (!provider || !signer) return;
      try {
        const address = await signer.getAddress();
        const balance = await provider.getBalance(address);
        balanceEl.textContent = ethers.utils.formatEther(balance) + ' ETH';
      } catch (err) {
        balanceEl.textContent = 'Error: ' + err.message;
      }
    }

    async function send() {
      sendStatus.textContent = '';
      sendStatus.className = 'status';

      const to = toInput.value.trim();
      const amount = amountInput.value.trim();

      if (!ethers.utils.isAddress(to)) {
        sendStatus.textContent = 'Invalid recipient address.';
        sendStatus.classList.add('error');
        return;
      }
      if (!amount || parseFloat(amount) <= 0) {
        sendStatus.textContent = 'Enter a positive amount.';
        sendStatus.classList.add('error');
        return;
      }

      sendBtn.disabled = true;
      try {
        const tx = await signer.sendTransaction({
          to: to,
          value: ethers.utils.parseEther(amount)
        });
        sendStatus.textContent = 'Transaction sent: ' + tx.hash + '\nWaiting for confirmation...';
        const receipt = await tx.wait();
        sendStatus.textContent = 'Confirmed in block ' + receipt.blockNumber + '\nHash: ' + tx.hash;
        sendStatus.classList.add('success');
        await refreshBalance();
      } catch (err) {
        sendStatus.textContent = 'Transaction failed: ' + err.message;
        sendStatus.classList.add('error');
      } finally {
        sendBtn.disabled = false;
      }
    }

    connectBtn.addEventListener('click', connect);
    refreshBtn.addEventListener('click', refreshBalance);
    sendBtn.addEventListener('click', send);
  </script>
</body>
</html>
